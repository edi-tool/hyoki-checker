<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表記ゆれさん</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
  <script src="js/defaultDict.js"></script>
  <script src="js/dictManager.js"></script>
  <script src="js/analyzer.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ヘッダー -->
<header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-3">
  <div class="text-2xl">📝</div>
  <div>
    <h1 class="text-xl font-bold text-gray-800">表記ゆれさん</h1>
    <p class="text-xs text-gray-500">文章中の表記ゆれを検出・統一します</p>
  </div>
</header>

<!-- メインレイアウト -->
<div class="flex gap-4 p-4 h-[calc(100vh-65px)]">

  <!-- 左ペイン：入力・プレビュー -->
  <div class="flex-[2] flex flex-col gap-3 min-w-0">

    <!-- ファイルドロップ -->
    <div id="dropZone"
         class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center text-sm text-gray-500 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors"
         onclick="document.getElementById('fileInput').click()">
      <div class="text-2xl mb-1">📂</div>
      <div>Word / PDF をドロップ、またはクリックして選択</div>
      <div class="text-xs text-gray-400 mt-1">.docx / .pdf</div>
      <input id="fileInput" type="file" accept=".docx,.pdf" class="hidden">
    </div>

    <!-- ローディング -->
    <div id="loading" class="hidden text-center text-sm text-blue-500 py-1">
      <span class="animate-pulse">⏳ 読み込み中...</span>
    </div>

    <!-- ツールバー -->
    <div class="flex items-center gap-2">
      <button onclick="downloadCorrectedDocx()"
              class="flex items-center gap-1.5 text-xs bg-green-600 text-white rounded px-3 py-1.5 hover:bg-green-700 transition-colors">
        📄 修正済みWordを出力
      </button>
      <div class="flex-1"></div>
      <span id="replacementBadge" class="hidden text-xs text-green-600 bg-green-50 border border-green-200 rounded-full px-2 py-0.5"></span>
      <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-red-400 transition-colors">クリア</button>
    </div>

    <!-- テキスト入力 -->
    <div class="flex-1 flex flex-col gap-1 min-h-0">
      <label class="text-sm font-medium text-gray-700">入力テキスト</label>
      <textarea id="inputText"
                class="flex-1 w-full border border-gray-200 rounded-lg p-3 text-sm resize-none focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 font-sans"
                placeholder="ここにテキストを入力、またはファイルをドロップしてください..."></textarea>
    </div>

    <!-- プレビュー -->
    <div class="flex-1 flex flex-col gap-1 min-h-0">
      <div class="flex items-center justify-between">
        <label class="text-sm font-medium text-gray-700">プレビュー（ハイライト）</label>
        <span id="previewCount" class="text-xs text-gray-400"></span>
      </div>
      <div id="preview"
           class="flex-1 overflow-y-auto border border-gray-200 rounded-lg p-3 text-sm bg-white font-sans leading-relaxed whitespace-pre-wrap break-words text-gray-700">
        <span class="text-gray-300">ここにハイライト表示されます</span>
      </div>
    </div>

  </div>

  <!-- 右サイドバー -->
  <div class="w-80 flex flex-col gap-4 overflow-y-auto">

    <!-- 検知結果（完全一致） -->
    <div class="bg-white rounded-lg border border-gray-200 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
        <span class="font-semibold text-sm text-gray-700">検知されたゆらぎ</span>
        <span id="resultCount" class="text-xs bg-gray-100 text-gray-500 rounded-full px-2 py-0.5">0 件</span>
      </div>
      <div id="results" class="p-3 flex flex-col gap-3 overflow-y-auto max-h-[35vh]">
        <p class="text-xs text-gray-400 text-center py-4">ゆらぎは検知されていません</p>
      </div>
    </div>

    <!-- ファジーチェック -->
    <div class="bg-white rounded-lg border border-gray-200 flex flex-col">
      <button onclick="toggleFuzzy()"
              class="px-4 py-3 border-b border-gray-100 flex items-center justify-between text-left w-full hover:bg-gray-50">
        <span class="font-semibold text-sm text-gray-700">ファジーチェック</span>
        <span id="fuzzyToggle" class="text-gray-400 text-xs">▼ 開く</span>
      </button>
      <div id="fuzzyPanel" class="hidden p-3 flex flex-col gap-3">
        <p class="text-xs text-gray-500">辞書に近い（ただし一致しない）表記をスキャンします。誤字・異体字の検出に有効です。</p>
        <div class="flex flex-col gap-2">
          <div class="flex items-center justify-between text-xs text-gray-600">
            <label>編集距離</label>
            <span id="fuzzyDistLabel" class="font-semibold text-purple-600">1（厳格）</span>
          </div>
          <input type="range" id="fuzzyThreshold" min="1" max="2" value="1"
                 class="w-full accent-purple-500"
                 oninput="document.getElementById('fuzzyDistLabel').textContent = this.value == 1 ? '1（厳格）' : '2（緩やか）'">
        </div>
        <button onclick="runFuzzyCheck()"
                class="bg-purple-500 text-white text-xs rounded px-3 py-1.5 hover:bg-purple-600 transition-colors">
          ファジーチェックを実行
        </button>
        <div id="fuzzyLoading" class="hidden text-xs text-purple-400 text-center animate-pulse">⏳ 解析中...</div>
        <div id="fuzzyResults" class="flex flex-col gap-2 max-h-48 overflow-y-auto"></div>
      </div>
    </div>

    <!-- カスタム辞書 -->
    <div class="bg-white rounded-lg border border-gray-200 flex flex-col">
      <button onclick="toggleCustomDict()"
              class="px-4 py-3 border-b border-gray-100 flex items-center justify-between text-left w-full hover:bg-gray-50">
        <span class="font-semibold text-sm text-gray-700">カスタム辞書</span>
        <span id="customDictToggle" class="text-gray-400 text-xs">▼ 開く</span>
      </button>
      <div id="customDictPanel" class="hidden p-3 flex flex-col gap-3">

        <!-- 手動追加 -->
        <div class="flex flex-col gap-2">
          <label class="text-xs text-gray-500">単語をカンマ区切りで入力（2語以上）</label>
          <input id="newRuleInput" type="text"
                 class="border border-gray-200 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-400"
                 placeholder="例: ウェブ,ウエブ,Web"
                 onkeydown="if(event.key==='Enter') addCustomRule()">
          <button onclick="addCustomRule()"
                  class="bg-blue-500 text-white text-xs rounded px-3 py-1.5 hover:bg-blue-600 transition-colors">
            追加する
          </button>
        </div>

        <!-- TSV/CSVインポート -->
        <div class="border-t border-gray-100 pt-2 flex flex-col gap-1">
          <p class="text-xs text-gray-500 font-medium">TSV / CSV から一括インポート</p>
          <p class="text-xs text-gray-400">形式: A列=語A&emsp;B列=語B（タブまたはカンマ区切り）</p>
          <label class="mt-1 block text-center text-xs text-blue-500 border border-blue-200 rounded px-3 py-1.5 hover:bg-blue-50 cursor-pointer transition-colors">
            📋 ファイルを選択
            <input type="file" accept=".tsv,.csv,.txt" class="hidden" onchange="importTSVCSV(event)">
          </label>
        </div>

        <!-- カスタム辞書リスト -->
        <div id="customDictList" class="flex flex-col gap-1.5 max-h-48 overflow-y-auto"></div>

        <!-- JSON エクスポート/インポート -->
        <div class="flex gap-2 pt-1 border-t border-gray-100">
          <button onclick="dictManager.exportJSON()"
                  class="flex-1 text-xs text-gray-500 border border-gray-200 rounded px-2 py-1 hover:bg-gray-50 transition-colors">
            JSON書き出し
          </button>
          <label class="flex-1 text-xs text-gray-500 border border-gray-200 rounded px-2 py-1 hover:bg-gray-50 transition-colors text-center cursor-pointer">
            JSON読み込み
            <input type="file" accept=".json" class="hidden" onchange="importCustomDict(event)">
          </label>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  const dictManager = new DictionaryManager();
  let currentText = '';
  let replacementLog = []; // {original, replacement, count}[]

  // ---- ファイル読み込み ----

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-blue-400', 'bg-blue-50'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-blue-400', 'bg-blue-50'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('border-blue-400', 'bg-blue-50');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  async function handleFile(file) {
    setLoading(true);
    try {
      const arrayBuffer = await file.arrayBuffer();
      const name = file.name.toLowerCase();
      let text = '';

      if (name.endsWith('.pdf') || file.type === 'application/pdf') {
        text = await extractPDF(arrayBuffer);
      } else if (name.endsWith('.docx')) {
        const result = await mammoth.extractRawText({ arrayBuffer });
        text = result.value;
      } else {
        alert('対応形式: .docx / .pdf');
        return;
      }

      replacementLog = [];
      document.getElementById('inputText').value = text;
      runCheck();
    } catch (e) {
      alert('読み込みエラー: ' + e.message);
    } finally {
      setLoading(false);
      fileInput.value = '';
    }
  }

  async function extractPDF(arrayBuffer) {
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join('') + '\n';
    }
    return text;
  }

  // ---- チェック処理 ----

  function runCheck() {
    currentText = document.getElementById('inputText').value;
    const results = analyze(currentText, dictManager.getAll());
    renderResults(results);
    renderPreview(results);
  }

  function renderResults(results) {
    const container = document.getElementById('results');
    const countEl = document.getElementById('resultCount');

    if (results.length === 0) {
      container.innerHTML = '<p class="text-xs text-gray-400 text-center py-4">ゆらぎは検知されていません</p>';
      countEl.textContent = '0 件';
      return;
    }

    countEl.textContent = results.length + ' 件';
    container.innerHTML = '';

    results.forEach(({ group, recommended, counts, others }) => {
      const card = document.createElement('div');
      card.className = 'border border-amber-200 bg-amber-50 rounded-lg p-3 flex flex-col gap-2';

      const countsHtml = counts.map(c =>
        `<span class="${c.word === recommended ? 'text-green-600 font-semibold' : 'text-red-500'}">${escapeHTML(c.word)}<span class="text-gray-400 text-xs ml-1">(${c.count})</span></span>`
      ).join('<span class="text-gray-300 mx-1">·</span>');

      card.innerHTML = `
        <div class="flex flex-wrap items-center gap-1 text-sm">${countsHtml}</div>
        <div class="text-xs text-gray-500">推奨：<span class="text-green-600 font-semibold">${escapeHTML(recommended)}</span></div>
        <button class="text-xs bg-green-500 text-white rounded px-3 py-1 hover:bg-green-600 transition-colors self-start">
          「${escapeHTML(recommended)}」に統一
        </button>
      `;

      card.querySelector('button').addEventListener('click', () => {
        const ta = document.getElementById('inputText');
        const oldText = ta.value;

        // 置換ログ記録
        for (const word of others) {
          const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const count = (oldText.match(new RegExp(escaped, 'g')) || []).length;
          if (count > 0) replacementLog.push({ original: word, replacement: recommended, count });
        }
        updateReplacementBadge();

        ta.value = replaceGroup(ta.value, group, recommended);
        runCheck();
      });

      container.appendChild(card);
    });
  }

  function renderPreview(results) {
    const preview = document.getElementById('preview');
    const countEl = document.getElementById('previewCount');

    if (!currentText) {
      preview.innerHTML = '<span class="text-gray-300">ここにハイライト表示されます</span>';
      countEl.textContent = '';
      return;
    }

    const totalHighlights = results.reduce((sum, r) => sum + r.others.length, 0);
    countEl.textContent = totalHighlights > 0 ? `⚠ ${totalHighlights} 種類のゆらぎ` : '✓ ゆらぎなし';
    preview.innerHTML = buildHighlightedHTML(currentText, results);
  }

  // ---- ファジーチェック ----

  function toggleFuzzy() {
    const panel = document.getElementById('fuzzyPanel');
    const toggle = document.getElementById('fuzzyToggle');
    const isHidden = panel.classList.toggle('hidden');
    toggle.textContent = isHidden ? '▼ 開く' : '▲ 閉じる';
  }

  async function runFuzzyCheck() {
    const loadingEl = document.getElementById('fuzzyLoading');
    const resultsEl = document.getElementById('fuzzyResults');
    const maxDist = parseInt(document.getElementById('fuzzyThreshold').value);

    if (!currentText.trim()) {
      resultsEl.innerHTML = '<p class="text-xs text-gray-400 text-center">テキストを入力してください</p>';
      return;
    }

    loadingEl.classList.remove('hidden');
    resultsEl.innerHTML = '';

    // UIを更新してから解析実行
    await new Promise(r => setTimeout(r, 20));

    const fuzzResults = fuzzyAnalyze(currentText, dictManager.getAll(), maxDist);

    loadingEl.classList.add('hidden');

    if (fuzzResults.length === 0) {
      resultsEl.innerHTML = '<p class="text-xs text-gray-400 text-center">ファジーマッチは検出されませんでした</p>';
      return;
    }

    resultsEl.innerHTML = '';
    fuzzResults.forEach(({ dictWord, group, candidates }) => {
      const card = document.createElement('div');
      card.className = 'border border-purple-200 bg-purple-50 rounded-lg p-2.5 flex flex-col gap-1';
      card.innerHTML = `
        <div class="text-xs font-semibold text-purple-700">「${escapeHTML(dictWord)}」に類似</div>
        <div class="text-xs text-gray-500 flex flex-wrap gap-1">
          ${candidates.map(c => `<code class="bg-purple-100 text-purple-800 rounded px-1">${escapeHTML(c)}</code>`).join('')}
        </div>
      `;
      resultsEl.appendChild(card);
    });
  }

  // ---- カスタム辞書UI ----

  function toggleCustomDict() {
    const panel = document.getElementById('customDictPanel');
    const toggle = document.getElementById('customDictToggle');
    const isHidden = panel.classList.toggle('hidden');
    toggle.textContent = isHidden ? '▼ 開く' : '▲ 閉じる';
    if (!isHidden) renderCustomDictList();
  }

  function addCustomRule() {
    const input = document.getElementById('newRuleInput');
    const words = input.value.split(',').map(w => w.trim()).filter(Boolean);
    if (words.length < 2) { alert('2語以上をカンマ区切りで入力してください'); return; }
    dictManager.addCustomGroup(words);
    input.value = '';
    renderCustomDictList();
    runCheck();
  }

  function renderCustomDictList() {
    const container = document.getElementById('customDictList');
    const custom = dictManager.getCustom();

    if (custom.length === 0) {
      container.innerHTML = '<p class="text-xs text-gray-400">カスタム辞書は空です</p>';
      return;
    }

    container.innerHTML = '';
    custom.forEach((group, idx) => {
      const row = document.createElement('div');
      row.className = 'flex items-center justify-between text-xs bg-gray-50 rounded px-2 py-1.5';
      row.innerHTML = `
        <span class="text-gray-600 truncate flex-1">${group.map(w => escapeHTML(w)).join(' · ')}</span>
        <button class="ml-2 text-gray-300 hover:text-red-400 transition-colors flex-shrink-0" title="削除">✕</button>
      `;
      row.querySelector('button').addEventListener('click', () => {
        dictManager.removeCustomGroup(idx);
        renderCustomDictList();
        runCheck();
      });
      container.appendChild(row);
    });
  }

  async function importCustomDict(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
      await dictManager.importJSON(file);
      renderCustomDictList();
      runCheck();
    } catch (e) {
      alert('インポートエラー: ' + e.message);
    }
    event.target.value = '';
  }

  async function importTSVCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const sep = file.name.endsWith('.csv') ? ',' : '\t';
      const count = dictManager.importDelimited(text, sep);
      alert(`${count} グループをインポートしました`);
      renderCustomDictList();
      runCheck();
    } catch (e) {
      alert('インポートエラー: ' + e.message);
    }
    event.target.value = '';
  }

  // ---- Word 出力 ----

  function downloadCorrectedDocx() {
    if (!currentText.trim()) { alert('テキストを入力してください'); return; }

    const results = analyze(currentText, dictManager.getAll());

    // 本文HTML（非推奨語を黄ハイライト）
    let bodyHtml = '<h2 style="font-size:14pt;margin-bottom:6pt;">本文</h2>';
    bodyHtml += `<p style="white-space:pre-wrap;font-size:11pt;line-height:1.8;">${buildHighlightedHTMLForDocx(currentText, results)}</p>`;

    // 置換ログ
    if (replacementLog.length > 0) {
      bodyHtml += '<h2 style="font-size:14pt;margin-top:18pt;margin-bottom:6pt;">置換ログ</h2>';
      bodyHtml += '<table border="1" cellpadding="6" style="border-collapse:collapse;font-size:10pt;width:100%;">';
      bodyHtml += '<tr style="background:#f0f0f0;"><th>元の語</th><th>置換後</th><th>件数</th></tr>';
      for (const { original, replacement, count } of replacementLog) {
        bodyHtml += `<tr><td>${escapeHTML(original)}</td><td>${escapeHTML(replacement)}</td><td style="text-align:center;">${count}</td></tr>`;
      }
      bodyHtml += '</table>';
    }

    // 未解決のゆらぎ
    if (results.length > 0) {
      bodyHtml += '<h2 style="font-size:14pt;margin-top:18pt;margin-bottom:6pt;">未解決のゆらぎ</h2>';
      bodyHtml += '<table border="1" cellpadding="6" style="border-collapse:collapse;font-size:10pt;width:100%;">';
      bodyHtml += '<tr style="background:#f0f0f0;"><th>推奨</th><th>混在語（出現数）</th></tr>';
      for (const { recommended, counts } of results) {
        const others = counts.filter(c => c.word !== recommended);
        bodyHtml += `<tr><td style="color:#1a7a3a;font-weight:bold;">${escapeHTML(recommended)}</td><td>${others.map(c => `${escapeHTML(c.word)}(${c.count})`).join('、')}</td></tr>`;
      }
      bodyHtml += '</table>';
    }

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="font-family:'Meiryo',sans-serif;margin:2cm;">${bodyHtml}</body></html>`;
    const blob = htmlDocx.asBlob(html);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '表記ゆれ修正済み.docx';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  /** docx出力用HTML（インラインスタイル） */
  function buildHighlightedHTMLForDocx(text, results) {
    let escaped = escapeHTML(text);
    for (const { others } of results) {
      for (const word of others) {
        const escapedWord = escapeHTML(word).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        escaped = escaped.replace(
          new RegExp(escapedWord, 'g'),
          `<span style="background-color:#FFFF00;">${escapeHTML(word)}</span>`
        );
      }
    }
    return escaped.replace(/\n/g, '<br>');
  }

  // ---- ユーティリティ ----

  function clearAll() {
    document.getElementById('inputText').value = '';
    replacementLog = [];
    updateReplacementBadge();
    runCheck();
  }

  function updateReplacementBadge() {
    const badge = document.getElementById('replacementBadge');
    const total = replacementLog.reduce((s, r) => s + r.count, 0);
    if (total > 0) {
      badge.textContent = `${total} 件置換済み`;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  function setLoading(on) {
    document.getElementById('loading').classList.toggle('hidden', !on);
  }

  // イベント
  document.getElementById('inputText').addEventListener('input', runCheck);
  runCheck();
</script>
</body>
</html>

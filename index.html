<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高度表記揺れチェッカー (Notation Consistency Checker)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>高度表記揺れチェッカー</h1>
            <p>Word (.docx) または PDF 原稿の表記の揺れをクライアントサイドで高速に確認します。</p>
        </header>

        <main>
            <section class="control-panel">
                <div class="file-input-wrapper">
                    <label for="file-upload" class="custom-file-upload">
                        ファイルを選択 (.docx /.pdf)
                    </label>
                    <input id="file-upload" type="file" accept=".docx,.pdf, application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
                    <span id="file-name">選択されていません</span>
                </div>

                <div class="settings">
                    <label class="beta-feature" title="ルールベースの接尾辞展開を用いた簡易検知">
                        <input type="checkbox" id="enable-inflection">
                        活用形チェックを有効にする (Beta/開発中)
                    </label>
                    <label class="beta-feature" title="NFKC正規化と長音符除去による簡易検知">
                        <input type="checkbox" id="enable-fuzzy">
                        ファジー検索を有効にする (Beta/開発中)
                    </label>
                </div>

                <button id="start-analysis" disabled>検知開始</button>
            </section>

            <section class="status-panel">
                <div id="loading-indicator" class="hidden">
                    <div class="spinner"></div>
                    <span id="status-text">バックグラウンドワーカーを初期化中...</span>
                </div>
            </section>

            <section class="results-panel">
                <h2>検知結果一覧 <span id="match-count" class="badge">0</span></h2>
                <div class="table-container">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th style="width: 15%;">検知タイプ</th>
                                <th style="width: 20%;">対象キーワード</th>
                                <th style="width: 50%;">周辺テキスト (コンテキスト)</th>
                                <th style="width: 15%;">文字位置</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/defaultDict.js"></script>
    <script src="js/main.js" defer></script>
</body>
</html>
